<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사진 업로드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>문예부</h1>
    <nav>
      <a href="index.html">홈</a>
      <a href="posts.html">작품</a>
      <a href="notices.html">공지</a>
      <a href="login.html">로그인</a>
    </nav>
  </header>

  <main>
    <section>
      <div class="badge">사진 등록</div>
      <h2>갤러리 업로드</h2>
      <p>사진을 업로드하고 카테고리를 선택하세요.</p>

      <input id="gallery-title" type="text" placeholder="제목" />
      <br /><br />

      <select id="gallery-category">
        <option value="월간지">월간지</option>
        <option value="작품집">작품집</option>
        <option value="활동사진">활동사진</option>
        <option value="행사사진">행사사진</option>
      </select>
      <br /><br />

      <input id="gallery-file" type="file" accept="image/*" />
      <br /><br />

      <textarea id="gallery-desc" placeholder="설명"></textarea>
      <br /><br />

      <div class="form-actions">
        <button onclick="addGallery()">업로드</button>
        <button class="cancel-btn" type="button" onclick="cancelTo('gallery.html')">작성 취소</button>
      </div>
    </section>
  </main>

  <footer class="simple-footer">
  Copyright © 2026 Philip™ Literature
</footer>

  <script src="script.js"></script>
</body>
</html>
