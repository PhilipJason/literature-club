<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작품 목록</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>문예부</h1>
    <nav>
      <a href="index.html">홈</a>
      <a href="posts.html">작품</a>
      <a href="notices.html">공지</a>
      <a href="login.html">로그인</a>
    </nav>
  </header>

  <main>
    <section>
      <div class="badge">문예부 아카이브</div>
      <h2>작품</h2>
      <p>문예부 부원들의 글과 기록을 둘러보세요.</p>

      <div class="sub-tabs">
        <a href="posts.html" class="active-tab">글 작품</a>
        <a href="gallery.html">갤러리</a>
      </div>

      <section class="post-toolbar">
        <input id="post-search" type="text" placeholder="제목, 내용, 카테고리 검색" />

        <select id="post-filter-category">
          <option value="전체">전체</option>
          <option value="시">시</option>
          <option value="수필">수필</option>
          <option value="기타">기타</option>
          <option value="소설">소설</option>
          <option value="비평">비평</option>
        </select>

        <select id="post-sort">
          <option value="latest">최신순</option>
          <option value="views">조회수순</option>
          <option value="likes">좋아요순</option>
          <option value="comments">댓글수순</option>
        </select>
      </section>

      <div class="notice-actions" id="post-actions"></div>
      <div class="list-wrapper" id="post-list"></div>
    </section>
  </main>

  <footer class="apple-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span>Copyright © 2026 Philip™ Literature</span>

        <div class="footer-links">

          <a href="terms.html">약관</a>
          <a href="legal.html">법적 고지</a>
          <a href="sitemap.html">사이트 맵</a>
        </div>
      </div>

      <div class="footer-right">대한민국</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ✅ JS -->
  <script src="script.js"></script>

</html>
