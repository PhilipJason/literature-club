<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작품 수정 | 문예부</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <h1><a href="index.html">문예부</a></h1>
    <nav>
      <a href="index.html">홈</a>
      <a href="posts.html">작품</a>
      <a href="notices.html">공지</a>
      <a href="gallery.html">갤러리</a>
      <a href="login.html">로그인</a>
    </nav>
  </header>

  <main>
    <section class="write-section">
      <div class="badge">작품 수정</div>
      <h2>작품 수정</h2>
      <p>기존 작품 내용을 수정할 수 있습니다.</p>

      <div class="form-group">
        <label for="post-title">제목</label>
        <input id="post-title" type="text" placeholder="제목을 입력하세요" />
      </div>

      <div class="form-group">
        <label for="post-category">장르</label>
        <select id="post-category">
          <option value="">장르 선택</option>
          <option value="시">시</option>
          <option value="수필">수필</option>
          <option value="소설">소설</option>
          <option value="비평">비평</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="post-content">내용</label>
        <textarea id="post-content" rows="14" placeholder="내용을 입력하세요"></textarea>
      </div>

      <div class="form-actions">
        <button id="post-submit-btn" type="button">수정 완료</button>
        <button
          type="button"
          class="cancel-btn"
          onclick="cancelTo('posts.html')"
        >
          취소
        </button>
      </div>
    </section>
  </main>

  <footer class="apple-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <strong>문예부</strong>
        <span>Copyright © 2026 문예부. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
