<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사진 수정 | 문예부</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <h1><a href="index.html">문예부</a></h1>
    <nav>
      <a href="index.html">홈</a>
      <a href="posts.html">작품</a>
      <a href="notices.html">공지</a>
      <a href="gallery.html">갤러리</a>
      <a href="login.html">로그인</a>
    </nav>
  </header>

  <main>
    <section class="write-section">
      <div class="badge">사진 수정</div>
      <h2>사진 수정</h2>
      <p>기존 사진 정보를 수정할 수 있습니다.</p>

      <div class="form-group">
        <label for="gallery-title">제목</label>
        <input id="gallery-title" type="text" placeholder="사진 제목을 입력하세요" />
      </div>

      <div class="form-group">
        <label for="gallery-category">카테고리</label>
        <select id="gallery-category">
          <option value="">카테고리 선택</option>
          <option value="월간지">월간지</option>
          <option value="작품집">작품집</option>
          <option value="활동사진">활동사진</option>
          <option value="행사사진">행사사진</option>
        </select>
      </div>

      <div class="form-group">
        <label for="gallery-file">새 사진 파일 (선택)</label>
        <input id="gallery-file" type="file" accept="image/*" />
      </div>

      <div class="form-group">
        <label for="gallery-desc">설명</label>
        <textarea id="gallery-desc" rows="8" placeholder="사진 설명을 입력하세요"></textarea>
      </div>

      <div class="form-actions">
        <button id="gallery-submit-btn" type="button">수정 완료</button>
        <button
          type="button"
          class="cancel-btn"
          onclick="cancelTo('gallery.html')"
        >
          취소
        </button>
      </div>
    </section>
  </main>

  <footer class="apple-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <strong>문예부</strong>
        <span>Copyright © 2026 문예부. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
